<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ED · MediaWatch — Le Compteur</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    body { background: radial-gradient(1200px 600px at 50% -10%, #1a1a20 0%, #0a0a0b 55%); font-family: Inter, system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: #26262b; border-radius: 8px; }
  </style>
</head>
<body class="text-zinc-200 min-h-screen">
  <header class="sticky top-0 z-20 backdrop-blur-xl bg-black/70 border-b border-[#26262b]">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-4">
      <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-blue-600 to-violet-600 grid place-items-center font-bold text-white text-sm">ED</div>
      <nav class="flex items-center gap-1 text-sm">
        <a href="index.html" class="px-3 py-1.5 rounded-lg text-zinc-400 hover:text-zinc-100">Flux</a>
        <a href="presse.html" class="px-3 py-1.5 rounded-lg text-zinc-400 hover:text-zinc-100">Presse</a>
        <a href="compteur.html" class="px-3 py-1.5 rounded-lg bg-violet-600/20 text-violet-300">Le Compteur</a>
        <a href="contradictions.html" class="px-3 py-1.5 rounded-lg text-zinc-400 hover:text-zinc-100">Validation</a>
      </nav>
      <div class="flex-1"></div>
      <p class="text-[11px] text-zinc-500">« À combien le chiffrez-vous ? » — valeurs annoncées dans le temps</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-5 grid grid-cols-1 md:grid-cols-[300px_1fr] gap-5">
    <aside>
      <h2 class="text-xs uppercase tracking-wide text-zinc-500 mb-2">Référents suivis</h2>
      <div id="list" class="space-y-1.5"></div>
    </aside>

    <section>
      <div id="head" class="mb-3">
        <h1 id="title" class="text-lg font-semibold">Sélectionne un référent</h1>
        <p id="sub" class="text-sm text-zinc-500"></p>
      </div>
      <div class="rounded-xl border border-[#26262b] bg-[#141417] p-4">
        <canvas id="chart" height="120"></canvas>
      </div>
      <div id="points" class="mt-4 space-y-2"></div>
    </section>
  </main>

  <script src="compteur.js"></script>
</body>
</html>
