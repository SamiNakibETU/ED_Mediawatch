<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ED · MediaWatch — Presse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: "#0a0a0b", panel: "#141417", line: "#26262b", muted: "#8a8a93", figure: "#7c3aed" },
      fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
    } } };
  </script>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    body { background: radial-gradient(1200px 600px at 50% -10%, #1a1a20 0%, #0a0a0b 55%); }
    .card-enter { animation: fade .35s ease both; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: #26262b; border-radius: 8px; }
  </style>
</head>
<body class="text-zinc-200 font-sans min-h-screen">
  <header class="sticky top-0 z-20 backdrop-blur-xl bg-ink/70 border-b border-line">
    <div class="max-w-6xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-2.5">
          <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-blue-600 to-figure grid place-items-center font-bold text-white text-sm">ED</div>
          <div>
            <h1 class="font-semibold leading-tight">MediaWatch</h1>
            <p class="text-[11px] text-muted leading-tight">Revue de presse · prises de parole extrême droite</p>
          </div>
          <nav class="ml-3 hidden sm:flex items-center gap-1 text-sm">
            <a href="index.html" class="px-3 py-1.5 rounded-lg text-muted hover:text-zinc-100">Réseaux sociaux</a>
            <a href="presse.html" class="px-3 py-1.5 rounded-lg bg-figure/20 text-figure">Presse</a>
            <span class="px-3 py-1.5 rounded-lg text-zinc-600 cursor-not-allowed select-none" title="En pause — phase d'analyse (MVP_SPEC §8)">Analyse · à venir</span>
          </nav>
        </div>
        <div id="stats" class="text-right text-[11px] text-muted tabular-nums"></div>
      </div>

      <div class="mt-3 flex items-center gap-2 flex-wrap">
        <div id="leaningPills" class="flex items-center gap-1.5 flex-wrap"></div>
        <div class="flex-1"></div>
        <span class="text-[11px] text-muted">Prises de parole de l'extrême droite</span>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-4 pb-24 flex gap-6">
    <aside class="w-56 shrink-0 hidden md:block">
      <div class="sticky top-24 max-h-[calc(100vh-7rem)] overflow-y-auto pr-1">
        <div class="text-[11px] uppercase tracking-wide text-zinc-600 px-2 mb-1">Thèmes</div>
        <nav id="themeTree" class="space-y-0.5"></nav>
      </div>
    </aside>
    <main class="flex-1 min-w-0">
      <div id="list" class="divide-y divide-line"></div>
      <div id="sentinel" class="py-8 text-center text-sm text-muted"></div>
    </main>
  </div>

  <!-- Panneau de lecture (slide-over) -->
  <div id="reader" class="fixed inset-0 z-40 hidden">
    <div id="readerBackdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <aside class="absolute right-0 top-0 h-full w-full max-w-2xl bg-panel border-l border-line shadow-2xl overflow-y-auto">
      <div class="sticky top-0 bg-panel/95 backdrop-blur border-b border-line px-5 py-3 flex items-center gap-3">
        <div id="readerMeta" class="min-w-0 flex-1 text-[12px] text-muted"></div>
        <button id="readerClose" class="text-zinc-400 hover:text-zinc-100 text-xl leading-none px-2">✕</button>
      </div>
      <article class="px-6 py-5">
        <h1 id="readerTitle" class="text-xl font-semibold text-zinc-100 leading-snug"></h1>
        <div id="readerSub" class="mt-2 text-[12px] text-muted flex flex-wrap items-center gap-2"></div>
        <div id="readerPeople" class="mt-3 flex flex-wrap gap-1"></div>
        <div id="readerBody" class="mt-5 text-[15px] leading-relaxed text-zinc-200 whitespace-pre-wrap"></div>
        <div id="readerFoot" class="mt-6 pt-4 border-t border-line flex items-center gap-3 text-[12px]"></div>
      </article>
    </aside>
  </div>

  <script src="common.js"></script>
  <script src="presse.js"></script>
</body>
</html>
