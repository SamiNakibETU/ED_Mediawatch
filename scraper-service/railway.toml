# Configuration Railway pour le service de scraping avancé
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Note: 1 worker uniquement — Playwright/Chromium consomme beaucoup de RAM,
# 2 workers = OOM sur Railway (le service ne devient jamais healthy).
# Utilise sh -c pour expansion de $PORT (Railway l'injecte dynamiquement).
startCommand = "sh -c 'exec uvicorn src.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1 --timeout-keep-alive 30'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
PYTHONUNBUFFERED = "1"
LOG_LEVEL = "INFO"
CACHE_ENABLED = "true"
PLAYWRIGHT_HEADLESS = "true"
JINA_AI_ENABLED = "true"
SCRAPLING_ENABLED = "true"
MAX_RETRIES = "5"
MIN_ARTICLE_WORDS = "150"
TARGET_ARTICLE_WORDS = "500"
PLAYWRIGHT_DEFAULT_TIMEOUT = "90000"
PLAYWRIGHT_NAVIGATION_TIMEOUT = "120000"
RATE_LIMIT_BASE_DELAY = "1.5"
VERIFY_COMPLETENESS = "true"
COMPLETENESS_THRESHOLD = "0.95"
# LLM cleanup (T6) — défaut Cerebras (Groq bloqué). La clé CEREBRAS_API_KEY est
# à poser en variable secrète Railway (pas ici). Vide = tier désactivé.
SCRAPER_LLM_CLEANUP_MODEL = "gpt-oss-120b"
SCRAPER_LLM_CLEANUP_BASE_URL = "https://api.cerebras.ai/v1"
